    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>ParkEase - Smart Parking Search</title>
        <link rel="stylesheet" href="park.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    </head>
    <body>

    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">ParkEase</div>

        <nav>
            <a href="#">Dashboard</a>
            <a href="my-bookings.html">Bookings</a>
            <a href="#">Support</a>
            <button class="cta-btn">Search Now</button>
        </nav>
    </header>

    <!-- MAIN -->
    <div class="main-container">

        <!-- FILTER PANEL -->
        <div class="filter-panel glass">

            <h2>Find Parking</h2>

            <label>Location</label>
            <input type="text" placeholder="Enter area or landmark">

            <label>Date</label>
            <input type="date">

            <label>Time</label>
            <div class="time-row">
                <input type="time" >
                <input type="time">
            </div>

            <label>Vehicle Type</label>
            <select>
                <option>🚗 Car</option>
                <option>🏍 Bike</option>
            </select>

            <label>Max Price:   <span id="priceValue"> ₹200</span></label>
            <input type="range" id="priceRange" min="0" max="500" step="20" value="200">

            <button class="search-btn">Search Parking</button>

        </div>

        <!-- RESULTS PANEL -->
        <div class="results-panel">

            <h2>Available Parking Spots</h2>

            <div class="parking-grid">

                <!-- CARD -->
                 <div class="parking-card">
                    <div class="card-image"></div>
                    <div class="card-content">
                        <h3>City Center Parking</h3>
                        <p class="location">MG Road • 500m away</p>
                        <p class="price">₹120 / hour</p>
                        <span class="badge available">Available</span>
                        <button onclick="window.location.href='booking.html'">Book Now</button>
                    </div>
                </div>

                <div class="parking-card">
                    <div class="card-image"></div>
                    <div class="card-content">
                        <h3>Metro Plaza Parking</h3>
                        <p class="location">Station Road • 1km away</p>
                        <p class="price">₹90 / hour</p>
                        <span class="badge limited">Limited</span>
                        <button>Book Now</button>
                    </div>
                </div>

                <div class="parking-card">
                    <div class="card-image"></div>
                    <div class="card-content">
                        <h3>Skyline Tower Parking</h3>
                        <p class="location">City Mall • 700m away</p>
                        <p class="price">₹150 / hour</p>
                        <span class="badge full">Full</span>
                        <button disabled>Full</button>
                    </div>
                </div>
                <script src="park.js"></script>
            </div>
        </div>
    </div>
    </body>
    </html>
